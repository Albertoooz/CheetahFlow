name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks — detect secrets in git history
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to post PR annotations when a secret is found
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan all commits, not just HEAD
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set GITLEAKS_LICENSE if you have a paid license (required for org-level scans).
          # For public repos or personal use this is not needed.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
