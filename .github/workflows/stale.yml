name: Stale

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 14
          days-before-issue-close: 7
          days-before-pr-stale: 10
          days-before-pr-close: 5
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: enhancement,pinned,security,no-stale
          exempt-pr-labels: no-stale
          operations-per-run: 500
          ascending: true
          exempt-all-assignees: true
          remove-stale-when-updated: true
          stale-issue-message: >
            This issue has been automatically marked as stale due to inactivity.
            Please add an update or it will be closed in 7 days.
          stale-pr-message: >
            This pull request has been automatically marked as stale due to inactivity.
            Please add an update or it will be closed in 5 days.
          close-issue-message: >
            Closing due to inactivity.
            If this is still relevant, please open a new issue with updated details.
          close-issue-reason: not_planned
          close-pr-message: >
            Closing due to inactivity.
            If you believe this PR should be revived, please open a new PR or comment on the related issue.
